name: YohPal Live AI Content Factory CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-ci:
    name: Backend Typecheck and Prisma Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: yohpal_live_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/yohpal_live_ai
      REDIS_URL: redis://localhost:6379
      KAFKA_BROKERS: localhost:9092

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Run database migration
        run: npx prisma migrate deploy

      - name: Typecheck backend
        run: npx tsc --noEmit

  admin-web-ci:
    name: Admin Web Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/admin_web

    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install admin dependencies
        run: npm install

      - name: Build admin dashboard
        run: npm run build

  flutter-ci:
    name: Flutter Analyze
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/mobile_flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter project
        run: flutter analyze
